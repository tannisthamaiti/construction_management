<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Well Intel | Correlation Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-track { background: #f9f9f9; border-right: 1px solid #ccc; height: 100%; position: relative; }
        .curve { stroke-width: 2; fill: none; }
        .tie-line { stroke: rgba(255, 0, 0, 0.5); stroke-dasharray: 4; }
        .marker-label { font-size: 10px; fill: red; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-900 text-slate-200 h-screen flex flex-col overflow-hidden">

    <nav class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="font-bold text-lg tracking-widest">WELL INTEL <span class="text-blue-400">CORRELATOR</span></span>
        </div>
        <div class="text-xs uppercase tracking-widest text-slate-500">OCI Tenancy: Production_Alpha</div>
    </nav>

    <main class="flex-1 flex">
        <section class="w-3/4 p-6 overflow-hidden flex flex-col">
            <div class="flex justify-between mb-4">
                <h3 class="text-slate-400 uppercase text-xs font-bold">Cross-Well Fence Diagram (Synthetic via NUTECH API)</h3>
                <button onclick="runCorrelation()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1 rounded text-sm transition">Run Auto-Correlation</button>
            </div>

            <div class="flex-1 bg-white rounded-lg relative overflow-hidden flex">
                <div class="w-1/3 h-full border-r border-gray-300 p-4">
                    <p class="text-black text-center font-bold border-b mb-2">Dittrich 1</p>
                    <svg width="100%" height="90%" viewBox="0 0 100 400">
                        <path d="M 50 0 Q 30 100, 70 200 T 50 400" stroke="blue" fill="none" />
                        <text x="5" y="105" class="marker-label">Top Eagle Ford</text>
                        <line x1="0" y1="100" x2="100" y2="100" stroke="red" stroke-width="1" />
                    </svg>
                </div>

                <div class="flex-1 h-full bg-slate-50 relative">
                    <svg id="correlation-svg" width="100%" height="100%" class="absolute inset-0">
                        </svg>
                </div>

                <div class="w-1/3 h-full border-l border-gray-300 p-4">
                    <p class="text-black text-center font-bold border-b mb-2">Eagle Ford Enh.</p>
                    <svg width="100%" height="90%" viewBox="0 0 100 400">
                        <path d="M 50 0 Q 60 120, 40 240 T 50 400" stroke="green" fill="none" />
                        <text x="5" y="135" class="marker-label">Top Eagle Ford</text>
                        <line x1="0" y1="130" x2="100" y2="130" stroke="red" stroke-width="1" />
                    </svg>
                </div>
            </div>
        </section>

        <aside class="w-1/4 bg-slate-800 p-4 border-l border-slate-700 flex flex-col space-y-4">
            <div class="bg-slate-900 p-3 rounded border border-slate-700">
                <h4 class="text-blue-400 text-xs font-bold mb-2">CORRELATION MATRIX</h4>
                <table class="w-full text-[10px] text-left">
                    <thead><tr class="text-slate-500 border-b border-slate-700"><th>Property</th><th>Coefficient</th></tr></thead>
                    <tbody id="matrix-body">
                        <tr><td class="py-1">Gamma Ray</td><td>--</td></tr>
                        <tr><td class="py-1">Resistivity</td><td>--</td></tr>
                        <tr><td class="py-1">Density</td><td>--</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="chat-output" class="flex-1 text-sm overflow-y-auto space-y-3">
                <p class="text-slate-400 italic">Awaiting analysis...</p>
            </div>
        </aside>
    </main>

    <script>
        function runCorrelation() {
            const svg = document.getElementById('correlation-svg');
            const chat = document.getElementById('chat-output');
            const matrix = document.getElementById('matrix-body');

            // Draw Tie-Line
            svg.innerHTML = '<line x1="0" y1="100" x2="100%" y2="130" class="tie-line" stroke="red" />';
            
            // Update Matrix
            matrix.innerHTML = `
                <tr><td class="py-1">Gamma Ray</td><td class="text-green-400">0.92</td></tr>
                <tr><td class="py-1">Resistivity</td><td class="text-yellow-400">0.74</td></tr>
                <tr><td class="py-1">Density</td><td class="text-green-400">0.88</td></tr>
            `;

            // Update Chat
            chat.innerHTML = `
                <div class="bg-blue-900/30 p-2 rounded border border-blue-500/50">
                    <strong>Well Intel Agent:</strong> Analysis Complete.<br><br>
                    Strong structural correlation found. The 30ft vertical offset suggests a local dip or faulting between the targets.
                </div>
            `;
        }
    </script>
</body>
</html>
