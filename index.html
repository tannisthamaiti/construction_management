<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Quiz</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; line-height: 1.6; }
        .question { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>Knowledge Check</h2>
    <div id="quiz-container">
        <div class="question">
            <p>1. What is the capital of France?</p>
            <input type="radio" name="q1" value="Paris"> Paris<br>
            <input type="radio" name="q1" value="London"> London<br>
            <input type="radio" name="q1" value="Berlin"> Berlin
        </div>

        <div class="question">
            <p>2. Which planet is known as the Red Planet?</p>
            <input type="radio" name="q2" value="Mars"> Mars<br>
            <input type="radio" name="q2" value="Venus"> Venus<br>
            <input type="radio" name="q2" value="Jupiter"> Jupiter
        </div>

        <button onclick="saveResults()">Download Results as .txt</button>
    </div>

    <script>
        function saveResults() {
            let results = "Quiz Results\n-----------\n";
            
            // Collect answers
            const q1 = document.querySelector('input[name="q1"]:checked');
            const q2 = document.querySelector('input[name="q2"]:checked');

            results += "Question 1: " + (q1 ? q1.value : "No answer") + "\n";
            results += "Question 2: " + (q2 ? q2.value : "No answer") + "\n";

            // Create a "Blob" (a file-like object of immutable, raw data)
            const blob = new Blob([results], { type: "text/plain" });
            const link = document.createElement("a");
            
            // Create a temporary link to trigger the download
            link.getAttribute("href");
            link.href = window.URL.createObjectURL(blob);
            link.download = "quiz_results.txt";
            link.click();
            
            // Clean up
            window.URL.revokeObjectURL(link.href);
        }
    </script>

</body>
</html>
