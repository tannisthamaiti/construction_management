<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Operations</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a78bfa;
    --success: #4ade80;
    --warning: #fbbf24;
    --error: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --line: #1e2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header-left h1 span { color: var(--accent); }

  .session-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .session-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
  }

  .stats-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 12px;
    text-align: center;
    min-width: 80px;
  }

  .stat-pill .val {
    font-size: 22px;
    font-weight: 600;
    display: block;
    font-family: 'Syne', sans-serif;
  }

  .stat-pill .lbl { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }

  .stat-pill.c-blue .val { color: var(--accent); }
  .stat-pill.c-orange .val { color: var(--accent2); }
  .stat-pill.c-purple .val { color: var(--accent3); }
  .stat-pill.c-green .val { color: var(--success); }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    margin-left: auto;
  }

  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    width: 160px;
  }

  .search-box input::placeholder { color: var(--muted); }

  /* Timeline tree */
  .timeline {
    position: relative;
  }

  /* Root node */
  .root-node {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    margin-bottom: 0;
    box-shadow: 0 0 20px rgba(0,229,255,0.08);
    position: relative;
    z-index: 2;
  }

  .root-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(0,229,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .root-text .title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .root-text .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Connector from root */
  .root-connector {
    width: 2px;
    height: 24px;
    background: linear-gradient(to bottom, var(--accent), var(--border));
    margin-left: 37px;
  }

  /* Group */
  .group-block {
    margin-bottom: 4px;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: border-color 0.2s;
    user-select: none;
    position: relative;
    z-index: 1;
  }

  .group-header:hover { border-color: #2e3a4e; }

  .group-dot {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .group-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; flex: 1; }
  .group-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
  }

  .chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.25s;
  }

  .group-header.open .chevron { transform: rotate(90deg); }

  /* Children container */
  .children-area {
    display: flex;
    margin-left: 0;
  }

  .vertical-line {
    width: 2px;
    background: var(--border);
    margin-left: 27px;
    margin-right: 0;
    flex-shrink: 0;
    border-radius: 2px;
  }

  .children-list {
    flex: 1;
    padding: 4px 0 4px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* Operation node */
  .op-node {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: all 0.2s;
    cursor: default;
    position: relative;
    animation: nodeIn 0.3s ease both;
  }

  @keyframes nodeIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .op-node:hover {
    border-color: #2e3a4e;
    background: #141420;
    transform: translateX(3px);
  }

  .op-node:hover .op-details { display: block; }

  .op-icon {
    width: 30px; height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .op-body { flex: 1; min-width: 0; }

  .op-top {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .op-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .op-time { font-size: 10px; color: var(--muted); margin-left: auto; white-space: nowrap; }

  .op-desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }

  .op-details {
    display: none;
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .op-details code {
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Status tags */
  .tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  .tag-success { background: rgba(74,222,128,0.12); color: var(--success); border: 1px solid rgba(74,222,128,0.2); }
  .tag-warning { background: rgba(251,191,36,0.12); color: var(--warning); border: 1px solid rgba(251,191,36,0.2); }
  .tag-error   { background: rgba(248,113,113,0.12); color: var(--error); border: 1px solid rgba(248,113,113,0.2); }
  .tag-info    { background: rgba(0,229,255,0.08); color: var(--accent); border: 1px solid rgba(0,229,255,0.15); }

  /* Colors per type */
  .type-query .op-icon { background: rgba(0,229,255,0.1); }
  .type-mutation .op-icon { background: rgba(255,107,53,0.1); }
  .type-auth .op-icon { background: rgba(167,139,250,0.1); }
  .type-file .op-icon { background: rgba(251,191,36,0.1); }
  .type-nav .op-icon { background: rgba(74,222,128,0.1); }

  .group-query .group-dot { background: rgba(0,229,255,0.1); color: var(--accent); }
  .group-mutation .group-dot { background: rgba(255,107,53,0.1); color: var(--accent2); }
  .group-auth .group-dot { background: rgba(167,139,250,0.1); color: var(--accent3); }
  .group-file .group-dot { background: rgba(251,191,36,0.1); color: var(--warning); }
  .group-nav .group-dot { background: rgba(74,222,128,0.1); color: var(--success); }

  /* Connector horizontal line before each op */
  .op-node::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 19px;
    width: 16px;
    height: 1px;
    background: var(--border);
  }

  /* Add operation button */
  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.04); }

  /* Connector between groups */
  .group-connector {
    width: 2px;
    height: 12px;
    background: var(--border);
    margin-left: 27px;
  }

  /* Hidden */
  .hidden { display: none !important; }

  /* Tooltip on hover info */
  .tooltip-hint {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 24px;
    letter-spacing: 0.05em;
  }

  .tooltip-hint span { color: var(--accent); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-left">
      <h1>Session <span>Operations</span></h1>
      <div class="session-badge" id="sessionId">SID: loading...</div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </header>

  <div class="controls">
    <div class="filter-group" id="filterGroup">
      <button class="btn active" data-filter="all">All</button>
      <button class="btn" data-filter="query">Queries</button>
      <button class="btn" data-filter="mutation">Mutations</button>
      <button class="btn" data-filter="auth">Auth</button>
      <button class="btn" data-filter="file">Files</button>
      <button class="btn" data-filter="nav">Navigation</button>
    </div>
    <div class="search-box">
      <span style="color:var(--muted);font-size:12px">⌕</span>
      <input type="text" id="searchInput" placeholder="search operations...">
    </div>
    <button class="btn" id="collapseAll">⊟ Collapse All</button>
    <button class="btn" id="expandAll">⊞ Expand All</button>
  </div>

  <div class="timeline" id="tree"></div>
  <p class="tooltip-hint">Hover over any node to see <span>details</span> · Click group headers to collapse/expand</p>
</div>

<script>
const SESSION_DATA = {
  id: 'ses_' + Math.random().toString(36).slice(2, 10).toUpperCase(),
  started: new Date(Date.now() - 47 * 60 * 1000),
  groups: [
    {
      id: 'auth',
      label: 'Authentication',
      icon: '🔐',
      type: 'auth',
      ops: [
        { id: 'a1', name: 'Login Attempt', icon: '🔑', status: 'success', time: '09:01:12', desc: 'User initiated login with email/password', detail: 'Method: <code>POST /api/auth/login</code> · Duration: <code>312ms</code>' },
        { id: 'a2', name: 'Token Issued', icon: '🎟', status: 'success', time: '09:01:13', desc: 'JWT access token generated and stored', detail: 'Token TTL: <code>3600s</code> · Scopes: <code>read write admin</code>' },
        { id: 'a3', name: 'MFA Verification', icon: '📲', status: 'success', time: '09:01:18', desc: 'TOTP code validated successfully', detail: 'OTP Method: <code>TOTP</code> · Issuer: <code>MyApp</code>' },
      ]
    },
    {
      id: 'nav',
      label: 'Navigation',
      icon: '🧭',
      type: 'nav',
      ops: [
        { id: 'n1', name: 'Route: /dashboard', icon: '🏠', status: 'success', time: '09:01:22', desc: 'Navigated to dashboard home page', detail: 'Route: <code>/dashboard</code> · Load time: <code>88ms</code>' },
        { id: 'n2', name: 'Route: /projects', icon: '📁', status: 'success', time: '09:04:10', desc: 'Opened projects list view', detail: 'Route: <code>/projects</code> · Load time: <code>102ms</code>' },
        { id: 'n3', name: 'Route: /projects/42', icon: '📄', status: 'success', time: '09:06:51', desc: 'Opened project detail page ID: 42', detail: 'Route: <code>/projects/42</code> · Load time: <code>210ms</code>' },
      ]
    },
    {
      id: 'query',
      label: 'Data Queries',
      icon: '🔍',
      type: 'query',
      ops: [
        { id: 'q1', name: 'fetchUserProfile', icon: '👤', status: 'success', time: '09:01:25', desc: 'Loaded current user profile data', detail: 'Cache: <code>MISS</code> · Rows: <code>1</code> · Duration: <code>45ms</code>' },
        { id: 'q2', name: 'listProjects', icon: '📋', status: 'success', time: '09:04:11', desc: 'Fetched all projects for current user', detail: 'Returned: <code>14 records</code> · Filters: <code>status=active</code> · <code>56ms</code>' },
        { id: 'q3', name: 'getProjectDetails', icon: '🔎', status: 'success', time: '09:06:52', desc: 'Loaded full project metadata for ID 42', detail: 'Relations: <code>tasks, members, tags</code> · <code>134ms</code>' },
        { id: 'q4', name: 'searchDocuments', icon: '🗂', status: 'warning', time: '09:11:30', desc: 'Full-text search returned partial results', detail: 'Query: <code>"quarterly report"</code> · Results: <code>3/10</code> · Timeout partial: <code>yes</code>' },
        { id: 'q5', name: 'getAnalytics', icon: '📊', status: 'success', time: '09:18:04', desc: 'Fetched engagement analytics for dashboard', detail: 'Range: <code>last 30 days</code> · Points: <code>720</code> · <code>89ms</code>' },
      ]
    },
    {
      id: 'mutation',
      label: 'Data Mutations',
      icon: '✏️',
      type: 'mutation',
      ops: [
        { id: 'm1', name: 'updateProjectTitle', icon: '📝', status: 'success', time: '09:07:44', desc: 'Renamed project "Q3 Launch" → "Q4 Launch"', detail: 'Entity: <code>Project#42</code> · Field: <code>title</code>' },
        { id: 'm2', name: 'createTask', icon: '✅', status: 'success', time: '09:09:12', desc: 'New task added: "Review mockups"', detail: 'Task ID: <code>tsk_789</code> · Assignee: <code>user_33</code> · Due: <code>2026-03-05</code>' },
        { id: 'm3', name: 'deleteComment', icon: '🗑', status: 'error', time: '09:13:08', desc: 'Failed to delete comment — permission denied', detail: 'Comment: <code>cmt_112</code> · Error: <code>403 Forbidden</code>' },
        { id: 'm4', name: 'updateTaskStatus', icon: '🔄', status: 'success', time: '09:15:50', desc: 'Task moved from "In Progress" to "Review"', detail: 'Task: <code>tsk_789</code> · From: <code>in_progress</code> → <code>review</code>' },
        { id: 'm5', name: 'inviteMember', icon: '👥', status: 'success', time: '09:22:33', desc: 'Invited alice@example.com to project', detail: 'Role: <code>editor</code> · Email sent: <code>yes</code>' },
      ]
    },
    {
      id: 'file',
      label: 'File Operations',
      icon: '📦',
      type: 'file',
      ops: [
        { id: 'f1', name: 'uploadAttachment', icon: '⬆️', status: 'success', time: '09:08:30', desc: 'Uploaded mockup.fig (4.2 MB) to project', detail: 'File: <code>mockup.fig</code> · Size: <code>4.2MB</code> · Bucket: <code>project-assets</code>' },
        { id: 'f2', name: 'downloadReport', icon: '⬇️', status: 'success', time: '09:19:55', desc: 'Downloaded Q3 report PDF', detail: 'File: <code>q3_report.pdf</code> · Size: <code>1.1MB</code> · Storage: <code>CDN hit</code>' },
        { id: 'f3', name: 'previewImage', icon: '🖼', status: 'success', time: '09:21:10', desc: 'Generated thumbnail for banner.png', detail: 'Resolution: <code>320×200</code> · Format: <code>webp</code> · Cache: <code>HIT</code>' },
      ]
    },
  ]
};

// Compute stats
function getStats(data) {
  let total = 0, success = 0, warnings = 0, errors = 0;
  data.groups.forEach(g => {
    g.ops.forEach(op => {
      total++;
      if (op.status === 'success') success++;
      if (op.status === 'warning') warnings++;
      if (op.status === 'error') errors++;
    });
  });
  return { total, success, warnings, errors };
}

function timeSince(date) {
  const mins = Math.floor((Date.now() - date) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  return Math.floor(mins/60) + 'h ' + (mins % 60) + 'm ago';
}

function buildTree(data, filter='all', search='') {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  const stats = getStats(data);

  // Stats
  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = `
    <div class="stat-pill c-blue"><span class="val">${stats.total}</span><div class="lbl">Operations</div></div>
    <div class="stat-pill c-green"><span class="val">${stats.success}</span><div class="lbl">Success</div></div>
    <div class="stat-pill c-orange"><span class="val">${stats.warnings}</span><div class="lbl">Warnings</div></div>
    <div class="stat-pill" style="--c:var(--error)"><span class="val" style="color:var(--error)">${stats.errors}</span><div class="lbl">Errors</div></div>
  `;

  document.getElementById('sessionId').textContent = `SID: ${data.id}  ·  started ${timeSince(data.started)}`;

  // Root node
  const root = document.createElement('div');
  root.className = 'root-node';
  root.innerHTML = `
    <div class="root-icon">🖥</div>
    <div class="root-text">
      <div class="title">Session Start</div>
      <div class="sub">${data.started.toLocaleTimeString()} · ${stats.total} total operations recorded</div>
    </div>
    <span class="tag tag-success">ACTIVE</span>
  `;
  tree.appendChild(root);

  // Filter groups
  const filteredGroups = data.groups.filter(g => {
    if (filter !== 'all' && g.type !== filter) return false;
    if (search) {
      return g.ops.some(op =>
        op.name.toLowerCase().includes(search) ||
        op.desc.toLowerCase().includes(search)
      );
    }
    return true;
  });

  filteredGroups.forEach((group, gi) => {
    // Connector
    const connector = document.createElement('div');
    connector.className = 'root-connector';
    connector.style.marginLeft = '37px';
    tree.appendChild(connector);

    const groupBlock = document.createElement('div');
    groupBlock.className = 'group-block';

    // Filter ops by search
    const visibleOps = search
      ? group.ops.filter(op => op.name.toLowerCase().includes(search) || op.desc.toLowerCase().includes(search))
      : group.ops;

    const isOpen = true;

    const header = document.createElement('div');
    header.className = `group-header open group-${group.type}`;
    header.innerHTML = `
      <div class="group-dot">${group.icon}</div>
      <span class="group-title">${group.label}</span>
      <span class="group-count">${visibleOps.length} ops</span>
      <span class="chevron">▶</span>
    `;
    groupBlock.appendChild(header);

    const childrenArea = document.createElement('div');
    childrenArea.className = 'children-area';

    const vline = document.createElement('div');
    vline.className = 'vertical-line';
    childrenArea.appendChild(vline);

    const childrenList = document.createElement('div');
    childrenList.className = 'children-list';

    visibleOps.forEach((op, oi) => {
      const statusClass = op.status === 'success' ? 'tag-success' : op.status === 'warning' ? 'tag-warning' : 'tag-error';
      const node = document.createElement('div');
      node.className = `op-node type-${group.type}`;
      node.style.animationDelay = `${oi * 0.04}s`;
      node.innerHTML = `
        <div class="op-icon">${op.icon}</div>
        <div class="op-body">
          <div class="op-top">
            <span class="op-name">${op.name}</span>
            <span class="tag ${statusClass}">${op.status}</span>
            <span class="op-time">${op.time}</span>
          </div>
          <div class="op-desc">${op.desc}</div>
          <div class="op-details">${op.detail}</div>
        </div>
      `;
      childrenList.appendChild(node);
    });

    // Add operation ghost button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.innerHTML = `+ log operation`;
    addBtn.onclick = () => {
      const mockOp = document.createElement('div');
      mockOp.className = `op-node type-${group.type}`;
      mockOp.innerHTML = `
        <div class="op-icon">⚡</div>
        <div class="op-body">
          <div class="op-top">
            <span class="op-name">New Operation</span>
            <span class="tag tag-info">NEW</span>
            <span class="op-time">${new Date().toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
          </div>
          <div class="op-desc">Manually logged operation</div>
        </div>
      `;
      childrenList.insertBefore(mockOp, addBtn.parentElement ? addBtn : null);
      childrenList.appendChild(addBtn);
    };
    childrenList.appendChild(addBtn);

    childrenArea.appendChild(childrenList);
    groupBlock.appendChild(childrenArea);

    // Toggle
    header.addEventListener('click', () => {
      const open = header.classList.toggle('open');
      childrenArea.style.display = open ? 'flex' : 'none';
    });

    tree.appendChild(groupBlock);

    // Connector between groups (not last)
    if (gi < filteredGroups.length - 1) {
      const gc = document.createElement('div');
      gc.className = 'group-connector';
      gc.style.marginLeft = '37px';
      tree.appendChild(gc);
    }
  });
}

// Filter and search
let currentFilter = 'all';
let currentSearch = '';

document.getElementById('filterGroup').addEventListener('click', e => {
  if (!e.target.dataset.filter) return;
  document.querySelectorAll('#filterGroup .btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  buildTree(SESSION_DATA, currentFilter, currentSearch);
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase().trim();
  buildTree(SESSION_DATA, currentFilter, currentSearch);
});

document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.group-header').forEach(h => {
    h.classList.remove('open');
    h.nextElementSibling.style.display = 'none';
  });
});

document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.group-header').forEach(h => {
    h.classList.add('open');
    h.nextElementSibling.style.display = 'flex';
  });
});

// Initial render
buildTree(SESSION_DATA);
</script>
</body>
</html>
